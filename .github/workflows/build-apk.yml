name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Vite Web App
        run: npm run build

      - name: Create Native Binary Asset Directory
        run: mkdir -p android/app/src/main/assets/bin

      - name: Cross-Compile Go for Android ARM64
        run: |
          cd go-backend
          if [ ! -f go.mod ]; then
            go mod init miruro-backend
          fi
          go get github.com/gin-gonic/gin
          go get github.com/gin-contrib/cors
          go get github.com/imroc/req/v3
          go get github.com/joho/godotenv
          
          # Force compiler to build an executable static binary for mobile ARM64
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 go build -o ../android/app/src/main/assets/bin/libgo_server.so main.go

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Sync Code to Capacitor Android
        run: npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: zenith-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
